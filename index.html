<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSQ - XLSX数据页面</title>
  <!-- SheetJS Excel解析CDN -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      padding: 20px;
      font-family: system-ui, sans-serif;
    }
    h2 {
      margin-bottom: 16px;
      color: #222;
    }
    #loading {
      font-size: 16px;
      color: #666;
      margin: 10px 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px 12px;
      text-align: left;
    }
    th {
      background-color: #f0f4f8;
    }
    tr:nth-child(even) {
      background-color: #f9fafc;
    }
  </style>
</head>
<body>
  <h2>表格数据（读取仓库data.xlsx）</h2>
  <div id="loading">正在加载Excel数据库文件 data.xlsx...</div>
  <table id="dataTable"></table>

  <script>
    // 仓库根目录下的Excel文件路径，无需修改
    const excelFilePath = "./data.xlsx";

    // 请求并解析XLSX
    fetch(excelFilePath)
      .then(resp => {
        if (!resp.ok) {
          throw new Error(`文件加载失败，请确认仓库根目录存在 data.xlsx`);
        }
        return resp.arrayBuffer();
      })
      .then(buffer => {
        document.getElementById("loading").textContent = "✅ 数据加载完成";
        // 解析Excel二进制
        const workbook = XLSX.read(buffer, { type: "array" });
        // 读取第一个工作表
        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
        // 转JSON数组，第一行自动作为表头
        const tableData = XLSX.utils.sheet_to_json(firstSheet);
        
        renderTable(tableData);
      })
      .catch(error => {
        document.getElementById("loading").textContent = "❌ " + error.message;
        console.error("读取Excel异常：", error);
      });

    // 渲染表格到页面
    function renderTable(dataList) {
      const tableDom = document.getElementById("dataTable");
      if (dataList.length === 0) {
        tableDom.innerHTML = "<tr><td>表格无数据，请检查data.xlsx内容</td></tr>";
        return;
      }

      // 获取表头字段
      const headerKeys = Object.keys(dataList[0]);
      let htmlStr = "<thead><tr>";
      headerKeys.forEach(key => {
        htmlStr += `<th>${key}</th>`;
      });
      htmlStr += "</tr></thead><tbody>";

      // 循环生成数据行
      dataList.forEach(row => {
        htmlStr += "<tr>";
        headerKeys.forEach(key => {
          htmlStr += `<td>${row[key] ?? ""}</td>`;
        });
        htmlStr += "</tr>";
      });
      htmlStr += "</tbody>";
      tableDom.innerHTML = htmlStr;
    }
  </script>
</body>
</html>
