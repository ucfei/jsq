<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>窗帘孔距查询表</title>
  <!-- Excel解析库CDN -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Microsoft Yahei", sans-serif;
    }
    body {
      max-width: 900px;
      margin: 30px auto;
      padding: 0 15px;
    }
    h1 {
      text-align: center;
      color: #222;
      margin-bottom: 25px;
      font-size: 24px;
    }
    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    #widthInput {
      flex: 1;
      padding: 12px 15px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
    }
    #searchBtn {
      padding: 12px 24px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }
    #searchBtn:hover {
      background: #1d4ed8;
    }
    #tip {
      margin: 10px 0;
      font-size: 15px;
      min-height: 22px;
    }
    .success { color: #039442; }
    .error { color: #dc2626; }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 12px;
      text-align: center;
      font-size: 15px;
    }
    th {
      background-color: #eff6ff;
    }
  </style>
</head>
<body>
  <h1>窗帘孔距完整对照表查询</h1>

  <!-- 查询输入区域 -->
  <div class="search-box">
    <input type="number" id="widthInput" placeholder="请输入窗帘宽度（单位cm，例如180）">
    <button id="searchBtn">查询孔距</button>
  </div>

  <!-- 提示信息：加载/成功/报错 -->
  <div id="tip" class="error">正在加载数据库 data.xlsx...</div>

  <!-- 查询结果表格 -->
  <table id="resultTable">
    <thead>
      <tr>
        <th>宽度(cm)</th>
        <th>孔数</th>
        <th>孔距(cm)</th>
        <th>单边边距(cm)</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <script>
    // 仓库根目录Excel文件路径
    const excelUrl = "./data.xlsx";
    let tableData = []; // 全局缓存Excel全部数据
    const tipDom = document.getElementById("tip");
    const tableBody = document.getElementById("tableBody");
    const widthInput = document.getElementById("widthInput");
    const searchBtn = document.getElementById("searchBtn");

    // 页面加载读取Excel
    fetch(excelUrl)
      .then(resp => {
        if (!resp.ok) throw new Error(`文件加载失败：仓库根目录不存在 data.xlsx`);
        return resp.arrayBuffer();
      })
      .then(buffer => {
        const workbook = XLSX.read(buffer, { type: "array" });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        // 转JSON数组，第一行自动作为表头
        tableData = XLSX.utils.sheet_to_json(sheet);
        tipDom.className = "success";
        tipDom.innerText = "✅ 数据加载完成，请输入宽度查询";
      })
      .catch(err => {
        tipDom.className = "error";
        tipDom.innerText = "❌ " + err.message;
        console.error("Excel读取异常：", err);
      });

    // 绑定查询按钮点击事件
    searchBtn.addEventListener("click", doSearch);
    // 回车也可查询
    widthInput.addEventListener("keydown", e => {
      if (e.key === "Enter") doSearch();
    });

    // 查询逻辑：根据宽度精确匹配
    function doSearch() {
      const inputVal = widthInput.value.trim();
      tableBody.innerHTML = "";

      // 判断输入是否为空
      if (!inputVal) {
        tipDom.className = "error";
        tipDom.innerText = "请输入窗帘宽度数字（cm）";
        return;
      }
      const targetWidth = Number(inputVal);

      // 筛选匹配宽度的数据
      const matchList = tableData.filter(item => Number(item["宽度(cm)"]) === targetWidth);

      if (matchList.length === 0) {
        tipDom.className = "error";
        tipDom.innerText = `未找到宽度为 ${targetWidth}cm 的对应数据`;
        return;
      }

      // 渲染匹配结果
      tipDom.className = "success";
      tipDom.innerText = `共查询到 ${matchList.length} 条匹配数据`;
      matchList.forEach(row => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${row["宽度(cm)"]}</td>
          <td>${row["孔数"]}</td>
          <td>${row["孔距(cm)"]}</td>
          <td>${row["单边边距(cm)"]}</td>
        `;
        tableBody.appendChild(tr);
      });
    }
  </script>
</body>
</html>
